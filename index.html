    var obj = {}, scr = "", circuito = {}, ari = [], aro = [];

    function setUpio(v) {
      iodescription.innerHTML = "";
      dinputs.innerHTML = ""; doutputs.innerHTML = ""


      for (var i = 0; i < inputs.value; i++) {

        dinputs.innerHTML += `<input type="radio" id="ii` + i + `" class="cios cin" onclick="check(this)" value="off" ></input>i` + i;
        iodescription.innerHTML += "i" + i + "<input type='text' onclick='setSrc(this.value," + i + ")' style='width:90%;' placeholder='Value, Desc'></input><br>";
        var input = {};
        input.name = "i" + i;
        input.src = new Boolean(false);
        input.desc = ""; input.v = false;
        input.connectTo = function (output) {
          output.v = this.value;

        }
        circuito.inputs.push(input);
        //ari.push(input.src)
        eval("i" + i + "=input");
        eval("ii" + i + ".co=input")

      }

      for (var i = 0; i < outputs.value; i++) {
        doutputs.innerHTML += `<input  type="radio" id="oo` + i + `" class="cios cou" style='color:red;' ></input>o` + i;
        iodescription.innerHTML += "o" + i + "<input type='text' style='width:90%;' placeholder=''></input>";


        var output = {};
        output.name = "o" + i;
        output.src = new Boolean(false);
        output.desc = ""; output.v = false;
        output.connectFrom = function (input) {
          this.value = input.v;
        }
        aro.push(output.src);
        eval("o" + i + "=output");
        eval("oo" + i + ".co=output")
        alert(JSON.stringify(eval("oo" + i + ".co")))
        circuito.outputs.push(output);

        var dd = document.getElementsByClassName("cou");
        alert("dddddddddddssssssssss\n\n" + JSON.stringify(dd[i].co))

      }


    }

    //////////////////////////
    check = function (e) {

      if (e.value === "on") { e.checked = false; e.value = "off" }
      else { e.checked = true; e.value = "on" }
      procesar();
      // logiceditor.value+=e.id+": "+e.checked+" "
    }

    function procesar() {
      var ai = document.getElementsByClassName("cin")

      for (var i = 0; i < ai.length; i++) {
        eval("i" + i + ".src=" + ai[i].checked);

      }

      var ao = document.getElementsByClassName("cou");


      for (var i = 0; i < ao.length; i++) {
        ao[i].checked = false;
        //ao[i].co.v="";
        alert("de aqui mero\n" + ao[i].co)


        eval("o" + i + ".src=" + ao[i].checked);//var 

      }

      eval(logiceditor.value);

      for (var i = 0; i < ao.length; i++) {
        //eval("var o"+i+"="+ao[i].checked);
        ao[i].checked = eval("o" + i + ".src");
        ao[i].value = eval("o" + i + ".v");
        alert(JSON.stringify(ao[i].co))
        //    alert(eval("o"+i+".src"));

      }
      circuito.logic = logiceditor.value;

    }

    function procesar2() {
      var ai = document.getElementsByClassName("cin")

      for (var i = 0; i < ai.length; i++) {
        eval("var i" + i + "=" + ai[i].checked);
      }

      var ao = document.getElementsByClassName("cou");
      /*ao.forEach(element => {

      */

      for (var i = 0; i < ao.length; i++) {
        ao[i].checked = false;
        eval("var o" + i + "=" + ao[i].checked);//var 
      }

      eval(logiceditor.value);
      for (var i = 0; i < ao.length; i++) {
        //eval("var o"+i+"="+ao[i].checked);
        ao[i].checked = eval("o" + i);
      }
      circuito.logic = logiceditor.value;

    }



    var linklib = "https://raw.githubusercontent.com/ljaureguil/My-Library/refs/heads/master/MyLibmin.js";
    var link = "https://api.jsonblob.com/019b80ce-bf27-7775-a066-af7b7869e5cf";//https://api.jsonblob.com/019b5163-39dc-74c4-b292-6655ebb3cf98"
    var GetJson, UpdateJson;

    loadDoc = function (url, callback) {

      var xhttp = new XMLHttpRequest();
      xhttp.open("GET", url, false);
      xhttp.send();
      if (callback != undefined) callback(xhttp.responseText);
      return xhttp.responseText;
    }





    loadDoc(linklib, function (data) {
      //alert(data)
      scr = data;
      eval(data);

      GetJson(link, function (r) {
        //area.value=r.cont;
        ///
        var fu = UpdateJson;
        //alert(r.name)
        UpdateJson = fu;
        //alert(UpdateJson)
        obj = r;
        for (var i = 0; i < obj.circuits.length; i++) {
          var c = obj.circuits[i];
          var opt = document.createElement("option");
          opt.value = c.name;
          opt.innerHTML = c.name;
          scirc.appendChild(opt);


        };
      })
    });

    function sendObj() {
      eval(scr);
      //  alert(UpdateJson)
      //obj.cont=area.value;
      var n = prompt("Name of the circuit", circuito.name);
      if (n != null) circuito.name = n;
      else return;
      obj.circuits.push(circuito);

      UpdateJson(link, obj, function (r) {
        alert("all done");
      });
    }

    function readData() {

      GetJson(link, function (r) {
        obj = r;
        //  area.value=obj.cont;
      });
    }

    function selc(v) {
      if (v == "") return;
      var c = obj.circuits.find(c => c.name == v);
      if (c == undefined) return;
      circuito = c;
      logiceditor.value = circuito.logic;
      inputs.value = circuito.inputs.length;
      outputs.value = circuito.outputs.length;
      setUpio();


    }

    function setSrc(v, i) {
      var ari = document.getElementsByClassName("cin");
      var parts = v.split(",");
      var desc = parts[1];
      if (desc == undefined) desc = "";
      var src = parts[0];
      circuito.inputs[i].desc = desc;
      circuito.inputs[i].src = src;
      var ii = eval("i" + i + ".v=src")
      //alert(JSON.stringify(ii))
      procesar();

    }
