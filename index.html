    class SpeechController {
      constructor(textareaElement) {
        if (!textareaElement || textareaElement.tagName !== 'INPUT') {//TEXTAREA
          throw new Error("Se debe proporcionar un elemento textarea válido.");
        }
        this.outputTarget = textareaElement;

        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SpeechRecognition) {
          console.error("Web Speech API no es soportada por este navegador.");
          return;
        }

        this.recognition = new SpeechRecognition();
        this.recognition.continuous = true;
        this.recognition.interimResults = false;
        this.recognition.lang = 'es-MX';
        this.isActive = false;

        this._initEvents();
      }

      // Activa el reconocimiento de voz
      on() {
        if (this.recognition && !this.isActive) {
          this.recognition.start();
          //  //alert("on")
        }
      }

      // Desactiva el reconocimiento de voz
      off() {
        //  //alert("off")
        if (this.recognition && this.isActive) {
          this.recognition.stop();

        }
      }

      // Limpia el contenido del textarea vinculada
      clear() {
        this.outputTarget.value = '';
      }

      _initEvents() {
        this.recognition.onstart = () => {
          this.isActive = true;
        };

        this.recognition.onend = () => {
          this.isActive = false;
        };

        this.recognition.onresult = (event) => {
          let textBuffer = '';

          for (let i = event.resultIndex; i < event.results.length; i++) {
            if (event.results[i] && event.results[i][0]) {
              const transcriptText = event.results[i][0].transcript;

              if (transcriptText && transcriptText !== 'undefined') {
                textBuffer += transcriptText;
              }
            }
          }

          let cleanText = textBuffer.trim();
          if (cleanText.length > 0) {
            // Auto-capitaliza la primera letra
            cleanText = cleanText.charAt(0).toUpperCase() + cleanText.slice(1);

            this.outputTarget.value += cleanText + '. ';
            this.outputTarget.oninput()
            //aqui
            this.outputTarget.scrollTop = this.outputTarget.scrollHeight;
          }
        };

        this.recognition.onerror = (event) => {
          console.error("Error de reconocimiento:", event.error);
        };
      }
    }

  <script>


    // Función base que procesa una única palabra limpia
    function silabearPalabra(palabra, forzarHiatos = true) {
      let p = palabra.trim();
      if (!p) return [];

      const Fuertes = "aeoAEOáéóÁÉÓ";
      // Quitamos la 'Y' de las vocales débiles base
      const Debiles = "iuIUüÜíúÍÚ";
      // Mantenemos la lista de consonantes estándar
      const Consonantes = "bcdfghjklmnñpqrstvwxyzBCDFGHJKLMNÑPQRSTVWXYZ";

      // Nueva función 'tipo' que analiza el contexto de la 'Y'
      function tipo(char, index) {
        if (!char) return 'X';

        // Si es 'Y' o 'y', evaluamos su posición fonética
        if (char.toLowerCase() === 'y') {
          // Si está al inicio de la palabra, es Consonante
          if (index === 0) return 'C';

          // Si está entre vocales (ej: ra-yo), es Consonante
          let anterior = p[index - 1];
          let siguiente = p[index + 1];
          let esVocalAnterior = anterior && (Fuertes.includes(anterior) || Debiles.includes(anterior));
          let esVocalSiguiente = siguiente && (Fuertes.includes(siguiente) || Debiles.includes(siguiente));
          if (esVocalAnterior && esVocalSiguiente) return 'C';

          // En cualquier otro caso (final de palabra como 'rey', 'hoy' o sola 'y'), actúa como vocal Débil
          return 'D';
        }

        if (Fuertes.includes(char)) return 'F';
        if (Debiles.includes(char)) {
          return "íúÍÚ".includes(char) ? 'F' : 'D';
        }
        if (Consonantes.includes(char)) return 'C';
        return 'X';
      }

      const gruposInseparables = ["bl", "cl", "fl", "gl", "pl", "br", "cr", "fr", "gr", "pr", "tr", "dr", "ch", "ll", "rr"];
      let puntosCorte = [];
      let i = 0;

      // PASO 1: Análisis de bloques de consonantes
      while (i < p.length) {
        if (tipo(p[i], i) === 'C') {
          let inicioC = i;
          while (i < p.length && tipo(p[i], i) === 'C') {
            i++;
          }
          let finC = i - 1;

          if (inicioC === 0 || finC === p.length - 1) continue;

          let longitud = finC - inicioC + 1;
          let par = p.substring(inicioC, finC + 1).toLowerCase();

          if (longitud === 1) {
            puntosCorte.push(inicioC);
          }
          else if (longitud === 2) {
            if (!gruposInseparables.includes(par)) {
              puntosCorte.push(inicioC + 1);
            } else {
              puntosCorte.push(inicioC);
            }
          }
          else if (longitud === 3) {
            let ultimasDos = par.substring(1, 3);
            if (gruposInseparables.includes(ultimasDos)) {
              puntosCorte.push(inicioC + 1);
            } else {
              puntosCorte.push(inicioC + 2);
            }
          }
          else if (longitud === 4) {
            puntosCorte.push(inicioC + 2);
          }
        } else {
          i++;
        }
      }

      let tempWord = "";
      let indicesCorte = new Set(puntosCorte);
      for (let j = 0; j < p.length; j++) {
        if (indicesCorte.has(j)) tempWord += "-";
        tempWord += p[j];
      }
      let silabasPrevia = tempWord.split("-");

      // PASO 2: Análisis de hiatos y diptongos (reconstruyendo índices globales)
      let resultadoFinal = [];
      let posicionGlobal = 0; // Rastreador para pasar el índice correcto a la función tipo()

      for (let silaba of silabasPrevia) {
        let subSilaba = "";
        let k = 0;

        while (k < silaba.length) {
          subSilaba += silaba[k];

          if (k < silaba.length - 1) {
            let actual = silaba[k];
            let siguiente = silaba[k + 1];

            let esHIntercalada = false;
            let offsetSiguiente = 1;
            if (siguiente.toLowerCase() === 'h' && k < silaba.length - 2) {
              siguiente = silaba[k + 2];
              esHIntercalada = true;
              offsetSiguiente = 2;
            }

            // Enviamos la posición global real de cada letra evaluada
            let t1 = tipo(actual, posicionGlobal + k);
            let t2 = tipo(siguiente, posicionGlobal + k + offsetSiguiente);

            if ((t1 === 'F' || t1 === 'D') && (t2 === 'F' || t2 === 'D')) {
              let separarVocal = false;

              if (t1 === 'F' && t2 === 'F') {
                separarVocal = true;
              }

              if (forzarHiatos && ((t1 === 'D' && t2 === 'F') || (t1 === 'F' && t2 === 'D'))) {
                separarVocal = true;
              }

              if (separarVocal) {
                if (esHIntercalada) {
                  subSilaba += silaba[k + 1];
                  k++;
                }
                resultadoFinal.push(subSilaba);
                subSilaba = "";
              }
            }
          }
          k++;
        }
        if (subSilaba) resultadoFinal.push(subSilaba);
        posicionGlobal += silaba.length; // Avanzamos el contador global al terminar la sílaba
      }

      return resultadoFinal;
    }

    // NUEVA FUNCIÓN: Procesa frases completas limpiando signos de puntuación externos
    function procesarFrase(frase) {
      if (!frase.trim()) return [];

      // Dividimos la frase por cualquier tipo de espacio en blanco
      let palabrasRaw = frase.trim().split(/\s+/);
      let fraseMatriz = [];

      for (let item of palabrasRaw) {
        // Limpiamos puntuación de los extremos (puntos, comas, signos de interrogación, etc.)
        // Manteniendo letras del español, acentos y la 'y'
        let palabraLimpia = item.replace(/^[¿¡!?,.:;()""'']+|[¿¡!?,.:;()""'']+$/g, '');

        if (palabraLimpia) {
          let silabasDePalabra = silabearPalabra(palabraLimpia, true);
          fraseMatriz.push(silabasDePalabra);

        }
      }

      return fraseMatriz;
    }
