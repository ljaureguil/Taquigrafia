      this.grafSilaba = function (ss) {
        // 1. Map simple group names to their respective method suffixes
        const groups = [
          ['cgkq', 'cgkqu_'], ['m', 'm_'], ['bp', 'bp_'], ['s', 'sc_'],
          ['rrr', 'rrr_'], ['nñ', 'nñ_'], ['lyll', 'lyll_'], ['jch', 'jch_'],
          ['fv', 'fv_'], ['dt', 'dt_'], ['_l', '_l']
        ];

        for (const [key, method] of groups) {
          if (this.silabas[key]?.includes(ss)) {
            this[method](ss);
            return; // Stops the loop and exits the method
          }
        }

        // 2. Process inseparable syllables safely using dynamic bracket notation
        for (const e of this.silabas.inseparables) {
          const method = `${e}_`;
          if (this.silabas[method]?.includes(ss)) {
            this[method](ss);
            return; // Stops the loop and exits the method
          }
        }

        // Helper to quickly check if 'ss' exists in any of the passed array keys
        const match = (...keys) => keys.some(key => this.a_(key).includes(ss));

        // 3. Process complex combined checks cleanly with early returns
        //if (match("tr_", "dr_"))   { this.t_(ss); return; }
        if (match("cr_s", "cr_z")) { this.c_(ss); return; }
        if (match("m_n")) { this.m_(ss); return; }
        if (match("t_n", "d_n")) { this.t_(ss); return; }
        if (match("_n")) { this.nñ_(ss); return; }
        if (match("j_m")) { this.j_(ss); return; }
        if (match("_")) { this.aeiou_(ss); return; }

        this.grafSilabaLiteral(ss)

      };

      }

        if (params.inicw) {
          params.lastPoint.x += 20;
          if (s.includes("a")) params.lastPoint.y = params.line - 25;
          if (s.includes("e") || s.includes("i")) params.lastPoint.y = params.line - 3;

      this.grContraccionR = function (inicPos, lineWidth, size, angle) {

        var p = inicPos;
        var path = new Path2D();
        path.moveTo(p.x, p.y);
        var pc = {};
        //  alert(JSON.stringify(p))
        if (angle === 0) { p.y -= 5; pc.x = p.x - 10; pc.y = p.y + 3 }
        if (angle === 45) { p.y -= 5; p.x += 5; pc.x = p.x - 12; pc.y = p.y + 1 };
        if (angle === 90) { p.x += 5; pc.x = p.x - 3; pc.y = p.y - 5 };
        if (angle === 135) { p.y += 5; p.x += 5; pc.x = p.x + 5; pc.y = p.y - 5 };

        path.quadraticCurveTo(pc.x, pc.y, p.x, p.y)

        ctx.lineWidth = lineWidth;
        ctx.stroke(path);
        return p;//pending

    // Función base que procesa una única palabra limpia
    function silabearPalabra(palabra, forzarHiatos = true) {
      let p = palabra.trim();
      if (!p) return [];

      const Fuertes = "aeoAEOáéóÁÉÓ";
      const Debiles = "iuyIUYüÜíúÍÚ";
      const Consonantes = "bcdfghjklmnñpqrstvwxyzBCDFGHJKLMNÑPQRSTVWXYZ".replace(/[yY]/g, '');

      const gruposInseparables = ["bl", "cl", "fl", "gl", "pl", "br", "cr", "fr", "gr", "pr", "tr", "dr", "ch", "ll", "rr"];

      function tipo(char) {
        if (!char) return 'X';
        if (Fuertes.includes(char)) return 'F';
        if (Debiles.includes(char)) {
          return "íúÍÚ".includes(char) ? 'F' : 'D';
        }
        if (Consonantes.includes(char)) return 'C';
        return 'X';
      }

      let puntosCorte = [];
      let i = 0;

      while (i < p.length) {
        if (tipo(p[i]) === 'C') {
          let inicioC = i;
          while (i < p.length && tipo(p[i]) === 'C') {
            i++;
          }
          let finC = i - 1;

          if (inicioC === 0 || finC === p.length - 1) continue;

          let longitud = finC - inicioC + 1;
          let par = p.substring(inicioC, finC + 1).toLowerCase();

          if (longitud === 1) {
            puntosCorte.push(inicioC);
          }
          else if (longitud === 2) {
            if (!gruposInseparables.includes(par)) {
              puntosCorte.push(inicioC + 1);
            } else {
              puntosCorte.push(inicioC);
            }
          }
          else if (longitud === 3) {
            let ultimasDos = par.substring(1, 3);
            if (gruposInseparables.includes(ultimasDos)) {
              puntosCorte.push(inicioC + 1);
            } else {
              puntosCorte.push(inicioC + 2);
            }
          }
          else if (longitud === 4) {
            puntosCorte.push(inicioC + 2);
          }
        } else {
          i++;
        }
      }

      let tempWord = "";
      let indicesCorte = new Set(puntosCorte);
      for (let j = 0; j < p.length; j++) {
        if (indicesCorte.has(j)) tempWord += "-";
        tempWord += p[j];
      }
      let silabasPrevia = tempWord.split("-");

      let resultadoFinal = [];

      for (let silaba of silabasPrevia) {
        let subSilaba = "";
        let k = 0;

        while (k < silaba.length) {
          subSilaba += silaba[k];

          if (k < silaba.length - 1) {
            let actual = silaba[k];
            let siguiente = silaba[k + 1];

            let esHIntercalada = false;
            if (siguiente.toLowerCase() === 'h' && k < silaba.length - 2) {
              siguiente = silaba[k + 2];
              esHIntercalada = true;
            }

            let t1 = tipo(actual);
            let t2 = tipo(siguiente);

            if ((t1 === 'F' || t1 === 'D') && (t2 === 'F' || t2 === 'D')) {
              let separarVocal = false;

              if (t1 === 'F' && t2 === 'F') {
                separarVocal = true;
              }

              if (forzarHiatos && ((t1 === 'D' && t2 === 'F') || (t1 === 'F' && t2 === 'D'))) {
                separarVocal = true;
              }

              if (separarVocal) {
                if (esHIntercalada) {
                  subSilaba += silaba[k + 1];
                  k++;
                }
                resultadoFinal.push(subSilaba);
                subSilaba = "";
              }
            }
          }
          k++;
        }
        if (subSilaba) resultadoFinal.push(subSilaba);
      }

      return resultadoFinal;
    }

    // NUEVA FUNCIÓN: Procesa frases completas limpiando signos de puntuación externos
    function procesarFrase(frase) {
      if (!frase.trim()) return [];

      // Dividimos la frase por cualquier tipo de espacio en blanco
      let palabrasRaw = frase.trim().split(/\s+/);
      let fraseMatriz = [];

      for (let item of palabrasRaw) {
        // Limpiamos puntuación de los extremos (puntos, comas, signos de interrogación, etc.)
        // Manteniendo letras del español, acentos y la 'y'
        let palabraLimpia = item.replace(/^[¿¡!?,.:;()""'']+|[¿¡!?,.:;()""'']+$/g, '');

        if (palabraLimpia) {
          let silabasDePalabra = silabearPalabra(palabraLimpia, true);
          fraseMatriz.push(silabasDePalabra);

        }
      }

      return fraseMatriz;
    }
