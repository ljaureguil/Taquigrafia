      this.getSilabas = function (palabra) {

        palabra = palabra.toLowerCase();

        const vocales = "aeiouáéíóúü";
        const fuertes = "aáeéoó";

        const gruposInseparables = [
          "bl", "br", "cl", "cr", "dr",
          "fl", "fr", "gl", "gr",
          "pl", "pr", "tl", "tr"
        ];

        function esVocal(c) {
          return vocales.includes(c);
        }

        function esFuerte(c) {
          return fuertes.includes(c);
        }

        function esDiptongo(v1, v2) {

          if (!esVocal(v1) || !esVocal(v2))
            return false;

          const f1 = esFuerte(v1);
          const f2 = esFuerte(v2);

          // Dos vocales fuertes => hiato
          if (f1 && f2)
            return false;

          // Vocal cerrada acentuada rompe diptongo
          if ("íú".includes(v1) || "íú".includes(v2))
            return false;

          return true;
        }

        let silabas = [];
        let pos = 0;

        while (pos < palabra.length) {

          let inicio = pos;

          // consonantes iniciales
          while (pos < palabra.length && !esVocal(palabra[pos])) {
            pos++;
          }

          // núcleo vocálico
          while (
            pos + 1 < palabra.length &&
            esDiptongo(palabra[pos], palabra[pos + 1])
          ) {
            pos++;
          }

          if (pos < palabra.length)
            pos++;

          let sigVocal = pos;

          while (
            sigVocal < palabra.length &&
            !esVocal(palabra[sigVocal])
          ) {
            sigVocal++;
          }

          const numCons = sigVocal - pos;

          // final de palabra
          if (sigVocal >= palabra.length) {
            silabas.push(palabra.slice(inicio));
            break;
          }

          if (numCons === 0) {

            silabas.push(palabra.slice(inicio, pos));

          } else if (numCons === 1) {

            silabas.push(palabra.slice(inicio, pos));

          } else if (numCons === 2) {

            const grupo = palabra.slice(pos, pos + 2);

            if (gruposInseparables.includes(grupo)) {
              silabas.push(palabra.slice(inicio, pos));
            } else {
              silabas.push(palabra.slice(inicio, pos + 1));
              pos += 1;
            }

          } else if (numCons === 3) {

            const grupoFinal = palabra.slice(pos + 1, pos + 3);

            if (gruposInseparables.includes(grupoFinal)) {
              silabas.push(palabra.slice(inicio, pos + 1));
              pos += 1;
            } else {
              silabas.push(palabra.slice(inicio, pos + 2));
              pos += 2;
            }

          } else {

            // 4 o más consonantes
            const grupoFinal = palabra.slice(pos + 2, pos + 4);

            if (gruposInseparables.includes(grupoFinal)) {
              silabas.push(palabra.slice(inicio, pos + 2));
              pos += 2;
            } else {
              silabas.push(palabra.slice(inicio, pos + 3));
              pos += 3;
            }
          }
        }

        return silabas;
      }

          var p = params.tx[params.index + 1]
          if (p === "a") params.lastPoint.y -= 45
          if (p === "e" || p === "i") params.lastPoint.y -= 32
          if (p === "o" || p === "u") params.lastPoint.y -= 15
          params.lastPoint.x += 60;

        }
        //////////////////////////////////
        var path = new Path2D();
        //   alert(JSON.stringify(params))
        var p = params.lastPoint;
        var lineWidth = 1;
        if (params.letter == "j") lineWidth = 3;

        path.moveTo(p.x, p.y);
        p.x -= 30;
        p.y += 30;
        if (params.lastLetter == "r") p.x += 10;;
        path.lineTo(p.x, p.y);
        // path.lastPoint = p;
        params.lastPoint = p;

        ctx.lineWidth = lineWidth;
        ctx.stroke(path); //alert(JSON.stringify(params))
        params.lastLetter = params.letter;
      }



      this.fv = function (params) {
        var lineWidth = 1;

        ///////////////////////////////////
        if (params.inicw) {
          var p = params.tx[params.index + 1]
          if (p === "a") params.lastPoint.y -= 45
          if (p === "e" || p === "i") params.lastPoint.y -= 33
          if (p === "o" || p === "u") params.lastPoint.y -= 15

        }
        //////////////////////////////////

        var path = new Path2D();
        var p = params.lastPoint;
        var lineWidth = 1;
        if (params.letter == "v") lineWidth = 3;
        path.moveTo(p.x, p.y)
        p.x += 30;
        p.y += 30;
        params.lastPoint = p;
        path.quadraticCurveTo(p.x - 25, p.y + 5, p.x, p.y);

        ctx.lineWidth = lineWidth;
        ctx.stroke(path); //  alert(JSON.stringify(params))
        params.lastLetter = params.letter;
      }

      this.lyll = function (params) {
        var lineWidth = 1;

        ///////////////////////////////////
        if (params.inicw) {
          var p = params.tx[params.index + 1]
          if (p === "a") params.lastPoint.y -= 15
          if (p === "e" || p === "i") params.lastPoint.y -= 3
          if (p === "o" || p === "u") params.lastPoint.y += 15

        }
        //////////////////////////////////

        var path = new Path2D();
        var p = params.lastPoint;
        var lineWidth = 1;
        if (params.letter == "y" || params.letter == "ll") lineWidth = 3;
        path.moveTo(p.x, p.y)
        p.x += 30;
        p.y -= 30;
        params.lastPoint = p;
        path.quadraticCurveTo(p.x - 25, p.y - 5, p.x, p.y);

        ctx.lineWidth = lineWidth;
        ctx.stroke(path); //  alert(JSON.stringify(params))
        params.lastLetter = params.letter;
      }

    }
